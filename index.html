<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cine Juntos | Mirar, chatear y sincronizar en vivo</title>
    <meta
      name="description"
      content="Sala privada para ver un video directo con chat y sincronizacion en tiempo real."
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://unpkg.com https://www.gstatic.com https://cinecompartidopagina-default-rtdb.firebaseio.com https://*.firebaseio.com https://*.firebasedatabase.app; script-src-elem 'self' https://unpkg.com https://www.gstatic.com https://cinecompartidopagina-default-rtdb.firebaseio.com https://*.firebaseio.com https://*.firebasedatabase.app; style-src 'self' 'unsafe-inline'; img-src 'self' http: https: data: blob:; media-src 'self' http: https: blob: data:; connect-src 'self' https://unpkg.com http://localhost:* http://127.0.0.1:* https://www.gstatic.com https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com https://*.firebasedatabase.app wss://*.firebasedatabase.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <link rel="preconnect" href="https://unpkg.com" />
    <link rel="preconnect" href="https://www.gstatic.com" />
    <link rel="stylesheet" href="./public/styles.css?v=20260715-02" />
  </head>
  <body class="is-lobby">
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-brand">
          <h1>Cine Juntos</h1>
        </div>
        <div class="topbar-actions">
          <div class="topbar-actions-group">
            <span class="app-status" id="connectionStatus" data-state="starting">
              <span class="app-status-dot" aria-hidden="true"></span>
              <span class="app-status-label">Iniciando</span>
            </span>
            <div class="room-chip" id="roomChip">
              <span class="room-chip-label">Sala</span>
              <span class="room-chip-code" id="roomBadge">Sin sala</span>
              <button
                class="room-chip-copy"
                id="copyInviteButton"
                type="button"
                aria-label="Copiar invitacion"
                data-tooltip="Copiar invitacion"
              >
                <span data-lucide="copy"></span>
              </button>
            </div>
          </div>
          <span class="host-badge" id="hostBadge" hidden>
            <span class="host-badge-dot" aria-hidden="true"></span>
            <span class="host-badge-label">Sos host</span>
          </span>
        </div>
      </header>

      <section class="lobby-screen" id="lobbyScreen" aria-label="Entrada a sala">
        <div class="lobby-hero">
          <aside class="lobby-description-card" aria-label="Descripción de la aplicación">
            <p class="lobby-description">
              Salas con reproducción sincronizada de videos entre todos los participantes, con controles
              compartidos y chat integrado
            </p>
          </aside>
        </div>
        <div class="lobby-panel">
          <div class="lobby-mark">
            <span data-lucide="film"></span>
          </div>
          <div class="lobby-fields">
            <label class="field">
              <span class="label-row">
                Nombre
                <button
                  class="help-button"
                  type="button"
                  aria-label="Ayuda sobre nombre"
                  data-tooltip="Este nombre aparece en tus mensajes y eventos de sincronizacion."
                >
                  <span data-lucide="circle-help"></span>
                </button>
              </span>
              <input
                id="lobbyNameInput"
                type="text"
                autocomplete="off"
                autocapitalize="off"
                spellcheck="false"
                data-bwignore="true"
                data-lpignore="true"
                maxlength="20"
                title="Nombre visible en chat y sincronizacion"
              />
            </label>
            <label class="field field-room">
              <span class="label-row">
                Codigo
                <button
                  class="help-button"
                  type="button"
                  aria-label="Ayuda sobre salas"
                  data-tooltip="Crea una sala y comparte el codigo o el enlace para mirar juntos."
                >
                  <span data-lucide="circle-help"></span>
                </button>
              </span>
              <input
                id="roomInput"
                type="text"
                inputmode="latin"
                autocomplete="off"
                autocapitalize="off"
                spellcheck="false"
                data-bwignore="true"
                data-lpignore="true"
                maxlength="5"
                placeholder="AB12C"
              />
            </label>
            <div class="lobby-actions">
              <button
                class="button primary"
                id="createRoomButton"
                type="button"
                title="Crear una sala nueva"
                data-tooltip="Crear una sala nueva"
              >
                <span data-lucide="plus"></span>
                Crear
              </button>
              <button
                class="button"
                id="joinRoomButton"
                type="button"
                title="Entrar con el codigo escrito"
                data-tooltip="Entrar con el codigo escrito"
              >
                <span data-lucide="log-in"></span>
                Entrar
              </button>
            </div>
          </div>
        </div>
      </section>

      <main class="session-view" id="sessionView" data-chat-dock="right" hidden>
        <section class="session-toolbar" aria-label="Controles de sala">
          <div class="source-strip">
            <div class="field">
              <span class="label-row">
                Video
                <button
                  class="help-button"
                  type="button"
                  aria-label="Ayuda sobre videos"
                  data-tooltip="Usa un enlace directo a un archivo MP4, WebM u otro formato reproducible por el navegador."
                >
                  <span data-lucide="circle-help"></span>
                </button>
              </span>
              <div class="input-with-button">
                <input
                  id="videoUrlInput"
                  type="url"
                  autocomplete="off"
                  autocapitalize="off"
                  spellcheck="false"
                  data-bwignore="true"
                  data-lpignore="true"
                  placeholder="https://servidor.com/video.mp4"
                  title="Pega un link directo a MP4, WebM u otro video compatible"
                />
                <button
                  class="button primary"
                  id="loadVideoButton"
                  type="button"
                  title="Cargar y sincronizar este video en la sala"
                  data-tooltip="Cargar y sincronizar video"
                >
                  <span data-lucide="play-square"></span>
                  Cargar
                </button>
              </div>
              <p
                id="syncStatus"
                class="sync-status video-status empty"
                title="Estado de video"
                data-tooltip="Estado de video"
              >
                <span class="video-status-icon" id="videoStatusIcon" data-lucide="circle"></span>
                <span id="videoStatusText">Sin contenido</span>
              </p>
            </div>
          </div>
        </section>

        <section class="workspace">
          <section class="video-area" aria-label="Reproductor sincronizado">
            <div class="player-frame" id="playerFrame" data-chat-style="float">
              <video
                id="videoPlayer"
                controlslist="nofullscreen nodownload noremoteplayback"
                disablepictureinpicture
                playsinline
                preload="metadata"
              ></video>
              <div class="empty-player" id="emptyPlayer">
                <span data-lucide="film"></span>
              </div>

              <div class="player-actions" aria-label="Controles de reproductor">
                <button
                  class="icon-button player-tool compact-tool"
                  id="playerChatToggleButton"
                  type="button"
                  aria-label="Mostrar u ocultar chat dentro del video"
                  title="Mostrar u ocultar chat dentro del video"
                  data-tooltip="Mostrar u ocultar chat dentro del video"
                >
                  <span data-lucide="message-square"></span>
                </button>
              </div>

              <div class="player-bottom-actions" aria-label="Controles inferiores del reproductor">
                <div class="player-controls-bar">
                  <button
                    class="video-control-button primary-video-control"
                    id="playerPlayButton"
                    type="button"
                    aria-label="Reproducir video"
                    title="Reproducir video"
                    data-tooltip="Reproducir video"
                  >
                    <span data-lucide="play"></span>
                  </button>

                  <div class="player-progress-group">
                    <span class="player-time" id="playerCurrentTime">0:00</span>
                    <input
                      class="player-seek-input"
                      id="playerSeekInput"
                      type="range"
                      min="0"
                      max="0"
                      step="0.1"
                      value="0"
                      aria-label="Avance del video"
                    />
                    <span class="player-time player-time-total" id="playerDuration">0:00</span>
                  </div>

                  <div class="player-volume-group" id="playerVolumeGroup">
                    <button
                      class="video-control-button"
                      id="playerMuteButton"
                      type="button"
                      aria-label="Silenciar"
                      title="Silenciar"
                      data-tooltip="Silenciar"
                    >
                      <span data-lucide="volume-2"></span>
                    </button>
                    <div class="player-volume-slider-wrap">
                      <input
                        class="player-volume-input"
                        id="playerVolumeInput"
                        type="range"
                        min="0"
                        max="1"
                        step="0.05"
                        value="1"
                        aria-label="Volumen"
                      />
                    </div>
                  </div>

                  <label class="player-select player-rate-select" for="playerRateSelect">
                    <select id="playerRateSelect" aria-label="Velocidad de reproduccion">
                      <option value="0.5">0.5x</option>
                      <option value="0.75">0.75x</option>
                      <option value="1" selected>1x</option>
                      <option value="1.25">1.25x</option>
                      <option value="1.5">1.5x</option>
                      <option value="2">2x</option>
                    </select>
                  </label>

                  <button
                    class="video-control-button"
                    id="pageFullscreenButton"
                    type="button"
                    aria-label="Pantalla completa de pagina"
                    title="Pantalla completa de pagina"
                    data-tooltip="Pantalla completa"
                  >
                    <span data-lucide="maximize"></span>
                  </button>
                </div>
              </div>

              <aside class="player-chat" id="playerChat" aria-label="Chat dentro del video">
                <div class="player-chat-header">
                  <button
                    class="presence-pill player-chat-presence"
                    id="overlayPresencePill"
                    type="button"
                    aria-label="Usuarios conectados"
                    data-tooltip="Conectados: vos"
                  >
                    <span class="presence-dot" aria-hidden="true"></span>
                    <span id="overlayParticipantCount">1</span>
                  </button>
                  <div
                    class="chat-style-toggle"
                    id="chatStyleToggle"
                    role="group"
                    aria-label="Estilo del chat dentro del video"
                  >
                    <button
                      type="button"
                      data-chat-style="float"
                      class="active"
                      aria-label="Mensajes flotantes"
                      title="Mensajes flotantes"
                    >
                      <span data-lucide="message-square"></span>
                    </button>
                    <button
                      type="button"
                      data-chat-style="panel"
                      aria-label="Panel transparente"
                      title="Panel transparente"
                    >
                      <span data-lucide="panel-right"></span>
                    </button>
                  </div>
                    <button
                      class="bare-icon-button"
                      id="closeInsideChatButton"
                      type="button"
                      aria-label="Ocultar chat"
                      title="Ocultar chat"
                      data-tooltip="Ocultar chat"
                    >
                      <span data-lucide="x"></span>
                    </button>
                  <span class="unread-badge player-chat-unread-badge" id="insideChatUnread" hidden>0</span>
                </div>
                <div class="messages-wrap">
                  <div class="overlay-messages" id="overlayMessages" aria-live="polite"></div>
                  <button class="scroll-bottom-btn" id="overlayScrollBottomBtn" hidden aria-label="Ir al último mensaje">
                    <span data-lucide="chevrons-down"></span>
                    <span class="scroll-bottom-badge" id="overlayScrollBadge">0</span>
                  </button>
                </div>
                <form class="message-form overlay-message-form" id="overlayMessageForm">
                <div class="reply-preview" id="overlayReplyPreview" hidden></div>
                <div class="image-preview-container" id="overlayImagePreview" hidden></div>
                <div class="input-wrapper">
                  <textarea
                    id="overlayMessageInput"
                    autocomplete="off"
                    autocapitalize="off"
                    spellcheck="false"
                    data-bwignore="true"
                    data-lpignore="true"
                    maxlength="600"
                    placeholder="Mensaje"
                    rows="1"
                    title="Escribir al chat de la sala"
                  ></textarea>
                    <button
                      class="icon-button ghost emoji-trigger"
                      id="overlayEmojiButton"
                      type="button"
                      aria-label="Abrir emojis"
                      title="Emojis"
                      data-tooltip="Agregar emoji"
                    >
                      <span data-lucide="smile-plus"></span>
                    </button>
                    <button class="icon-button send" id="overlayMessageSend" type="submit" aria-label="Enviar mensaje">
                      <span data-lucide="send"></span>
                    </button>
                  </div>
                  <div class="char-counter" id="overlayCharCounter">0 / 600</div>
                </form>
              </aside>
            </div>
          </section>

          <aside class="chat-area" aria-label="Chat de la sala">
            <div class="chat-tools">
              <button
                class="presence-pill"
                id="presencePill"
                type="button"
                aria-label="Usuarios conectados"
                data-tooltip="Conectados: vos"
              >
                <span class="presence-dot" aria-hidden="true"></span>
                <span id="participantCount">1</span>
              </button>
              <div class="chat-name-field">
                <span class="label-row">
                  Nombre
                  <button
                    class="help-button"
                    type="button"
                    aria-label="Ayuda sobre nombre"
                    data-tooltip="Este nombre aparece en tus mensajes y eventos de sincronizacion."
                  >
                    <span data-lucide="circle-help"></span>
                  </button>
                </span>
                <input
                  id="nameInput"
                  type="text"
                  autocomplete="off"
                  autocapitalize="off"
                  spellcheck="false"
                  data-bwignore="true"
                  data-lpignore="true"
                  maxlength="20"
                  title="Nombre visible en chat y sincronizacion"
                />
              </div>
              <button
                class="icon-button dock-button"
                id="dockChatButton"
                type="button"
                aria-label="Mover chat"
                data-tooltip="Mover chat abajo"
              >
                <span data-lucide="panel-right"></span>
              </button>
            </div>

            <div class="messages-wrap">
              <div class="messages" id="messages" aria-live="polite"></div>
              <button class="scroll-bottom-btn" id="mainScrollBottomBtn" hidden aria-label="Ir al último mensaje">
                <span data-lucide="chevrons-down"></span>
                <span class="scroll-bottom-badge" id="mainScrollBadge">0</span>
              </button>
            </div>

            <form class="message-form" id="messageForm">
              <div class="reply-preview" id="replyPreview" hidden></div>
              <div class="image-preview-container" id="imagePreview" hidden></div>
              <div class="input-wrapper">
                <textarea
                  id="messageInput"
                  autocomplete="off"
                  autocapitalize="off"
                  spellcheck="false"
                  data-bwignore="true"
                  data-lpignore="true"
                  maxlength="600"
                  placeholder="Mensaje"
                  rows="1"
                  title="Escribir al chat de la sala"
                ></textarea>
                <button
                  class="icon-button ghost emoji-trigger"
                  id="messageEmojiButton"
                  type="button"
                  aria-label="Abrir emojis"
                  title="Emojis"
                  data-tooltip="Agregar emoji"
                >
                  <span data-lucide="smile-plus"></span>
                </button>
                <button class="icon-button send" id="mainMessageSend" type="submit" aria-label="Enviar mensaje">
                  <span data-lucide="send"></span>
                </button>
              </div>
              <div class="char-counter" id="mainCharCounter">0 / 600</div>
            </form>
          </aside>
          <button
            class="chat-collapse-handle"
            id="collapseChatButton"
            type="button"
            aria-label="Contraer chat"
            title="Contraer chat"
            data-tooltip="Contraer chat"
          >
            <span data-lucide="chevron-right"></span>
            <span class="unread-badge chat-unread-badge" id="externalChatUnread" hidden>0</span>
          </button>
        </section>
      </main>

      <div class="emoji-popover" id="emojiPopover" hidden aria-label="Selector de emojis"></div>
      <div class="message-menu" id="messageMenu" hidden>
        <button type="button" data-action="copy">Copiar</button>
        <button type="button" data-action="reply">Responder</button>
      </div>
      <div class="tooltip-layer" id="tooltipLayer" hidden></div>
    </div>

    <script src="./public/dev-runtime.js?v=20260715-02"></script>
    <script defer src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
    <script src="./public/firebase-config.js"></script>
    <script type="module" src="./src/main.js?v=20260715-01"></script>
  </body>
</html>
